name: JaCoCo report

on:
  pull_request:
    branches: [ master ]
    types: [ opened, edited, synchronize, reopened ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # The project supports Scala 2.12, 2.13
          # The CI runs all tests suites for all supported Scala versions at build.yml
          # The codebase for all Scala versions is the same, so the coverage is calculated only once
          # Scala 2.12 is chosen since it is supported by the most wide range of Spark versions and
          # vendor distributions.
          - scala: 2.12.20
            scalaShort: "2.12"
            overall: 80.0
            changed: 80.0
            per-changed-file: 60.0

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d

      - name: Setup Scala
        uses: olafurpg/setup-scala@32ffa16635ff8f19cc21ea253a987f0fdf29844c
        with:
          java-version: "adopt@1.11"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Build and run tests
        run: sbt ++${{matrix.scala}} jacoco

      - name: Add JaCoCo Report in PR comments
        id: jacoco
        uses: MoranaApps/jacoco-report@3be109b40946547c5925e63d41fef1099c9e562b
        with:
          paths: |
            **/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          global-thresholds: '${{ matrix.overall }}*${{ matrix.changed }}'
          report-thresholds-default: '${{ matrix.overall }}*${{ matrix.changed }}*${{ matrix.per-changed-file }}'
          title: JaCoCo code coverage report - scala ${{ matrix.scala }}
          update-comment: true

      - name: Get the Coverage info
        run: |
          echo "Total coverage ${{ steps.jacoco.outputs.coverage-overall }}"
          echo "Changed Files coverage ${{ steps.jacoco.outputs.coverage-changed-files }}"

